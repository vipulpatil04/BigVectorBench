float:
  euclidean:
    - base_args: ["@metric"]
      constructor: LanceDBIVFPQ
      disabled: False
      docker_tag: bigvectorbench-lancedb
      module: bigvectorbench.algorithms.lancedb
      name: lancedb-ivfpq
      run_groups:
        IVF_PQ:
          args:
            num_partitions: [256]
            num_sub_vectors: [64]
          query_args: [
              [1, 5, 10, 20, 50, 100, 200], # nprobes
              [1], # refine_factor
            ]
    - base_args: ["@metric"]
      constructor: LanceDBIVFHNSW
      disabled: False
      docker_tag: bigvectorbench-lancedb
      module: bigvectorbench.algorithms.lancedb
      name: lancedb-ivfhnsw
      run_groups:
        IVF_HNSW:
          args:
            num_partitions: [1]
            m: [16]
            ef_construction: [200]
          query_args: [
              [10, 20, 50, 100, 200, 400], # ef
              [1], # refine_factor
            ]
